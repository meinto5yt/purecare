<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loader.css" />
  <script>
window.addEventListener("load", function () {
    const loader = document.querySelector(".wrapper");

    loader.style.opacity = "0";

    setTimeout(() => {
        loader.style.display = "none";
    }, 500);
});
</script>
</head>
<body>
   
<div class="wrapper">
    <div class="blockcont">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>
</div>

    <form class="login-container" onsubmit="login(event)">

        <h2>Login</h2>

        <input type="text" id="username" placeholder="Username" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="sign.html">Sign Up</a>
        </p>

        <p id="error"></p>

    </form>

    <script src="script.js"></script>

</body>
</html>
